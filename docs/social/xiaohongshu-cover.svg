<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.5" stop-color="#f3f7f6"/>
      <stop offset="1" stop-color="#fff8f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#1f2937" flood-opacity="0.16"/>
    </filter>
    <style>
      .sans { font-family: "WenQuanYi Zen Hei", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
      .title { font-size: 66px; font-weight: 800; fill: #111827; letter-spacing: 0; }
      .subtitle { font-size: 30px; font-weight: 500; fill: #4b5563; letter-spacing: 0; }
      .label { font-size: 24px; font-weight: 800; fill: #2563eb; text-transform: uppercase; letter-spacing: 0; }
      .h2 { font-size: 34px; font-weight: 800; fill: #111827; letter-spacing: 0; }
      .body { font-size: 26px; font-weight: 500; fill: #374151; letter-spacing: 0; }
      .hint { font-size: 22px; font-weight: 500; fill: #6b7280; letter-spacing: 0; }
      .small { font-size: 20px; font-weight: 600; fill: #6b7280; letter-spacing: 0; }
      .button { font-size: 24px; font-weight: 800; fill: #ffffff; letter-spacing: 0; }
      .code { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 23px; fill: #1f2937; }
    </style>
  </defs>

  <rect width="1080" height="1440" fill="url(#bg)"/>

  <g class="sans">
    <text x="72" y="108" class="label">OPEN SOURCE TOOL</text>
    <text x="72" y="192" class="title">微软拼音 DAT</text>
    <text x="72" y="274" class="title">生成与查看工具</text>
    <text x="72" y="338" class="subtitle">姓名名单批量导入微软拼音，本地运行，不上传数据</text>

    <g transform="translate(72 405)" filter="url(#shadow)">
      <rect width="936" height="800" rx="28" fill="#ffffff"/>
      <rect width="936" height="800" rx="28" fill="none" stroke="#e5e7eb"/>

      <g transform="translate(36 36)">
        <rect width="864" height="122" rx="20" fill="#f8fafc" stroke="#e5e7eb"/>
        <text x="28" y="40" class="label">Configuration</text>
        <text x="28" y="86" class="h2">生成设置</text>

        <g transform="translate(28 148)">
          <text x="0" y="0" class="body" font-weight="800">生成模式</text>
          <rect x="0" y="18" width="500" height="68" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
          <text x="26" y="62" class="body">用户自定义短语 DAT（首字母）</text>
          <path d="M456 43 L470 57 L484 43" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

          <text x="532" y="0" class="body" font-weight="800">ImeWlConverter 路径</text>
          <rect x="532" y="18" width="304" height="68" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
          <text x="554" y="62" class="code">/home/.../ImeWl...</text>
        </g>

        <g transform="translate(28 286)">
          <rect width="400" height="310" rx="18" fill="#f8fafc" stroke="#e5e7eb"/>
          <text x="26" y="48" class="h2">手工输入</text>
          <rect x="26" y="74" width="348" height="158" rx="14" fill="#ffffff" stroke="#d1d5db"/>
          <text x="50" y="118" class="body">张三</text>
          <text x="50" y="164" class="body">李四</text>
          <text x="50" y="210" class="body">王小明</text>
          <rect x="26" y="254" width="162" height="42" rx="12" fill="#e0f2fe"/>
          <text x="48" y="283" class="small" fill="#0369a1">支持 txt/csv/xlsx</text>

          <rect x="464" width="372" height="310" rx="18" fill="#f8fafc" stroke="#e5e7eb"/>
          <text x="490" y="48" class="h2">结果预览</text>
          <g transform="translate(490 76)">
            <rect width="320" height="54" rx="10" fill="#eef2ff"/>
            <text x="22" y="35" class="body" font-weight="800">姓名</text>
            <text x="210" y="35" class="body" font-weight="800">编码</text>
            <text x="22" y="95" class="body">张三</text>
            <text x="210" y="95" class="code">zs</text>
            <line x1="0" y1="116" x2="320" y2="116" stroke="#e5e7eb"/>
            <text x="22" y="156" class="body">李四</text>
            <text x="210" y="156" class="code">ls</text>
            <line x1="0" y1="177" x2="320" y2="177" stroke="#e5e7eb"/>
            <text x="22" y="217" class="body">王小明</text>
            <text x="210" y="217" class="code">wxm</text>
          </g>
        </g>

        <g transform="translate(28 642)">
          <rect width="200" height="62" rx="16" fill="#2563eb"/>
          <text x="39" y="40" class="button">解析并预览</text>
          <rect x="226" width="162" height="62" rx="16" fill="#111827"/>
          <text x="260" y="40" class="button">生成 DAT</text>
          <rect x="414" width="130" height="62" rx="16" fill="#16a34a"/>
          <text x="454" y="40" class="button">下载</text>
          <text x="588" y="38" class="hint">也能上传已有 DAT 反向查看词条</text>
        </g>
      </g>
    </g>

    <g transform="translate(72 1268)">
      <rect width="286" height="54" rx="16" fill="#dbeafe"/>
      <text x="28" y="36" class="body" fill="#1d4ed8">本地运行</text>
      <rect x="314" width="286" height="54" rx="16" fill="#dcfce7"/>
      <text x="342" y="36" class="body" fill="#15803d">支持预览修改</text>
      <rect x="628" width="308" height="54" rx="16" fill="#ffedd5"/>
      <text x="656" y="36" class="body" fill="#c2410c">开源项目</text>
    </g>

    <text x="72" y="1380" class="small">GitHub: github.com/xiongyiguang/pinyin-converter</text>
  </g>
</svg>
